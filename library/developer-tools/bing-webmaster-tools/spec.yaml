name: bing-webmaster-tools
display_name: "Bing Webmaster Tools"
description: "Bing Webmaster Tools API CLI — sites, sitemaps, URL & content submission, traffic & query stats, crawl control, links, keyword research, and per-site config, with a local store and offline search."
cli_description: "Every Bing Webmaster Tools API method, plus a local SQLite store, offline search, and SEO analytics no other Bing tool has — built agent-native."
version: "0.1.0"
base_url: "https://ssl.bing.com/webmaster/api.svc/json"

mcp:
  transport: [stdio, http]
  orchestration: code
  endpoint_tools: hidden

auth:
  type: api_key
  in: query
  header: "apikey"
  env_vars:
    - BING_WEBMASTER_API_KEY
  key_url: "https://www.bing.com/webmasters/"
  instructions: "Bing Webmaster Tools dashboard → Settings → API access → generate an API key."
  verify_path: "/GetUserSites"

config:
  format: toml
  path: "~/.config/bing-webmaster-tools-cli/config.toml"

resources:
  sites:
    description: "Verified sites, ownership, roles, child sites, and site moves"
    endpoints:
      list:
        method: GET
        path: "/GetUserSites"
        description: "List all sites registered with your Bing Webmaster Tools account"
        response:
          type: array
          item: Site
      add:
        method: POST
        path: "/AddSite"
        description: "Add a new site to your account"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL to add (e.g. https://example.com)"
      verify:
        method: POST
        path: "/VerifySite"
        description: "Verify ownership of a site"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL to verify"
      remove:
        method: POST
        path: "/RemoveSite"
        description: "Remove a site from your account"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL to remove"
      get-roles:
        method: GET
        path: "/GetSiteRoles"
        description: "List users who have access to a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: SiteRole
      add-role:
        method: POST
        path: "/AddSiteRoles"
        description: "Delegate site access to another user"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: delegatedSiteUrl
            type: string
            description: "Delegated site URL (when delegating a sub-site)"
          - name: email
            type: string
            description: "Email of the user to grant access"
      remove-role:
        method: POST
        path: "/RemoveSiteRole"
        description: "Revoke a user's site access"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: delegatedSiteUrl
            type: string
            description: "Delegated site URL"
      children:
        method: GET
        path: "/GetChildSitesInfo"
        description: "Get info about child sites under a parent site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Parent site URL"
        response:
          type: array
          item: ChildSite
      add-child:
        method: POST
        path: "/AddChildSite"
        description: "Add a child site under a parent site"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Parent site URL"
          - name: childUrl
            type: string
            required: true
            description: "Child site URL"
      moves:
        method: GET
        path: "/GetSiteMoves"
        description: "Get the site-move notifications submitted for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: SiteMove
      submit-move:
        method: POST
        path: "/SubmitSiteMove"
        description: "Notify Bing of a site move"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Old site URL"
          - name: info
            type: string
            description: "Site-move info (JSON payload describing source/target and date)"

  feeds:
    description: "Sitemaps and RSS/Atom feeds"
    endpoints:
      list:
        method: GET
        path: "/GetFeeds"
        description: "List sitemaps and feeds submitted for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: Feed
      submit:
        method: POST
        path: "/SubmitFeed"
        description: "Submit a sitemap or feed URL for a site"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: feedUrl
            type: string
            required: true
            description: "Sitemap or feed URL"
      remove:
        method: POST
        path: "/RemoveFeed"
        description: "Remove a previously submitted sitemap or feed"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: feedUrl
            type: string
            required: true
            description: "Sitemap or feed URL"

  submit:
    description: "URL and content submission for indexing, plus quotas"
    endpoints:
      url:
        method: POST
        path: "/SubmitUrl"
        description: "Submit a single URL for indexing"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL the page belongs to"
          - name: url
            type: string
            required: true
            description: "URL to submit for indexing"
      batch:
        method: POST
        path: "/SubmitUrlBatch"
        description: "Submit multiple URLs for indexing in one call"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL the pages belong to"
          - name: urlList
            type: array
            required: true
            description: "List of URLs to submit"
      quota:
        method: GET
        path: "/GetUrlSubmissionQuota"
        description: "Get the daily/monthly URL-submission quota and remaining allowance"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: object
          item: UrlSubmissionQuota
      content:
        method: POST
        path: "/SubmitContent"
        description: "Submit page HTML content directly without waiting for a crawl"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL the page belongs to"
          - name: url
            type: string
            required: true
            description: "Page URL"
          - name: httpMessage
            type: string
            required: true
            description: "Base64-encoded HTTP response (headers + HTML body) for the page"
          - name: structuredData
            type: string
            description: "Optional base64-encoded structured-data blob"
      content-quota:
        method: GET
        path: "/GetContentSubmissionQuota"
        description: "Get the content-submission quota and remaining allowance"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: object
          item: ContentSubmissionQuota

  fetch:
    description: "Fetch-as-Bingbot results"
    endpoints:
      list:
        method: GET
        path: "/GetFetchedUrls"
        description: "List URLs fetched as Bingbot for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: FetchedUrl
      get:
        method: GET
        path: "/GetFetchedUrlDetails"
        description: "Get the fetch-as-Bingbot details for a specific URL"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: url
            type: string
            required: true
            description: "URL that was fetched"
        response:
          type: object
          item: FetchedUrlDetails
      url:
        method: POST
        path: "/FetchUrl"
        description: "Queue a URL to be fetched as Bingbot"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: url
            type: string
            required: true
            description: "URL to fetch"

  traffic:
    description: "Search traffic, query stats, page stats, and rank/traffic time series"
    endpoints:
      stats:
        method: GET
        path: "/GetRankAndTrafficStats"
        description: "Get clicks and impressions by day for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: RankTrafficStat
      queries:
        method: GET
        path: "/GetQueryStats"
        description: "Get per-query search performance (clicks, impressions, CTR, position) for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: QueryStat
      pages:
        method: GET
        path: "/GetPageStats"
        description: "Get per-page search performance for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: PageStat
      query-pages:
        method: GET
        path: "/GetQueryPageStats"
        description: "Get per-query, per-page search performance for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: query
            type: string
            description: "Filter to a specific query"
        response:
          type: array
          item: QueryPageStat
      query-page-detail:
        method: GET
        path: "/GetQueryPageDetailStats"
        description: "Get detailed daily stats for a specific query-page combination"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: query
            type: string
            required: true
            description: "Query"
          - name: page
            type: string
            required: true
            description: "Page URL"
        response:
          type: array
          item: QueryPageDetailStat

  url:
    description: "Per-URL index status and traffic info"
    endpoints:
      info:
        method: GET
        path: "/GetUrlInfo"
        description: "Get index information for a specific URL"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: url
            type: string
            required: true
            description: "URL to look up"
        response:
          type: object
          item: UrlInfo
      traffic:
        method: GET
        path: "/GetUrlTrafficInfo"
        description: "Get traffic information for a specific URL"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: url
            type: string
            required: true
            description: "URL to look up"
        response:
          type: object
          item: UrlTrafficInfo

  crawl:
    description: "Crawl statistics, crawl issues, and crawl settings"
    endpoints:
      stats:
        method: GET
        path: "/GetCrawlStats"
        description: "Get crawl statistics (crawled pages, in-index, errors) by day for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: CrawlStat
      issues:
        method: GET
        path: "/GetCrawlIssues"
        description: "Get crawl issues/errors for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: CrawlIssue
      get-settings:
        method: GET
        path: "/GetCrawlSettings"
        description: "Get the crawl settings for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: object
          item: CrawlSettings
      set-settings:
        method: POST
        path: "/SaveCrawlSettings"
        description: "Update the crawl settings for a site"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: crawlSettings
            type: string
            required: true
            description: "Crawl settings payload (JSON describing crawl rate and per-hour limits)"

  links:
    description: "Inbound links and connected pages"
    endpoints:
      counts:
        method: GET
        path: "/GetLinkCounts"
        description: "Get inbound link counts for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: page
            type: int
            description: "Page index for paginated link results"
        response:
          type: array
          item: LinkCount
      url:
        method: GET
        path: "/GetUrlLinks"
        description: "Get inbound links for a specific site URL"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: link
            type: string
            required: true
            description: "Target URL to get inbound links for"
          - name: page
            type: int
            description: "Page index for paginated link results"
        response:
          type: array
          item: UrlLink
      connected:
        method: GET
        path: "/GetConnectedPages"
        description: "List pages connected to a site (e.g. social profiles, related domains)"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: ConnectedPage
      add-connected:
        method: POST
        path: "/AddConnectedPage"
        description: "Add a page that links to your website"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: masterUrl
            type: string
            required: true
            description: "URL of the connected page"
      remove-connected:
        method: POST
        path: "/RemoveConnectedPage"
        description: "Remove a connected page"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: masterUrl
            type: string
            required: true
            description: "URL of the connected page"

  keywords:
    description: "Keyword research and historical keyword stats"
    endpoints:
      data:
        method: GET
        path: "/GetKeyword"
        description: "Get keyword data (impressions, broad/exact match counts) for a keyword"
        params:
          - name: q
            type: string
            required: true
            description: "Keyword to look up"
            flag_name: keyword
            aliases: [q]
          - name: country
            type: string
            description: "Two-letter country code"
          - name: language
            type: string
            description: "Language code (e.g. en-US)"
        response:
          type: object
          item: Keyword
      related:
        method: GET
        path: "/GetRelatedKeywords"
        description: "Get keywords related to a seed keyword"
        params:
          - name: q
            type: string
            required: true
            description: "Seed keyword"
            flag_name: keyword
            aliases: [q]
          - name: country
            type: string
            description: "Two-letter country code"
          - name: language
            type: string
            description: "Language code (e.g. en-US)"
        response:
          type: array
          item: RelatedKeyword
      stats:
        method: GET
        path: "/GetKeywordStats"
        description: "Get historical impression stats for a keyword"
        params:
          - name: q
            type: string
            required: true
            description: "Keyword to look up"
            flag_name: keyword
            aliases: [q]
          - name: country
            type: string
            description: "Two-letter country code"
          - name: language
            type: string
            description: "Language code (e.g. en-US)"
        response:
          type: array
          item: KeywordStat

  block-urls:
    description: "URLs blocked from Bing's index"
    endpoints:
      list:
        method: GET
        path: "/GetBlockedUrls"
        description: "List URLs/directories blocked from Bing's index for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: BlockedUrl
      add:
        method: POST
        path: "/AddBlockedUrl"
        description: "Block a URL or directory from Bing's index"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: blockedUrl
            type: string
            required: true
            description: "URL or directory to block"
          - name: entityType
            type: string
            description: "Block scope: Page or Directory"
          - name: requestType
            type: string
            description: "Block type: FullRemoval or CacheRemoval"
      remove:
        method: POST
        path: "/RemoveBlockedUrl"
        description: "Unblock a previously blocked URL or directory"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: blockedUrl
            type: string
            required: true
            description: "URL or directory to unblock"
          - name: entityType
            type: string
            description: "Block scope: Page or Directory"
          - name: requestType
            type: string
            description: "Block type: FullRemoval or CacheRemoval"

  page-preview:
    description: "Page-preview (rich snippet) blocks"
    endpoints:
      list:
        method: GET
        path: "/GetActivePagePreviewBlocks"
        description: "List active page-preview blocks for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: PagePreviewBlock
      add:
        method: POST
        path: "/AddPagePreviewBlock"
        description: "Add a page-preview block to prevent rich snippets for a URL pattern"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: url
            type: string
            required: true
            description: "URL or pattern to block previews for"
          - name: pagePreviewRegion
            type: string
            description: "Region/market the block applies to"
      remove:
        method: POST
        path: "/RemovePagePreviewBlock"
        description: "Remove a page-preview block"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: url
            type: string
            required: true
            description: "URL or pattern"

  deep-links:
    description: "Deep-link blocks for app deep links"
    endpoints:
      list:
        method: GET
        path: "/GetDeepLinkBlocks"
        description: "List blocked deep links for a site"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: DeepLinkBlock
      add:
        method: POST
        path: "/AddDeepLinkBlock"
        description: "Block deep links for a URL pattern"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: market
            type: string
            description: "Market the block applies to"
          - name: searchUrl
            type: string
            required: true
            description: "Search-result URL pattern"
          - name: deepLink
            type: string
            description: "Deep link to block"
      remove:
        method: POST
        path: "/RemoveDeepLinkBlock"
        description: "Remove a deep-link block"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: market
            type: string
            description: "Market"
          - name: searchUrl
            type: string
            required: true
            description: "Search-result URL pattern"
          - name: deepLink
            type: string
            description: "Deep link"

  query-params:
    description: "URL query-parameter normalization rules"
    endpoints:
      list:
        method: GET
        path: "/GetQueryParameters"
        description: "List URL query-parameter normalization rules for a site (may require elevated account permissions)"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: QueryParameter
      add:
        method: POST
        path: "/AddQueryParameter"
        description: "Add a URL query-parameter normalization rule"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: queryParameter
            type: string
            required: true
            description: "Query parameter name to normalize"
      remove:
        method: POST
        path: "/RemoveQueryParameter"
        description: "Remove a URL query-parameter normalization rule"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: queryParameter
            type: string
            required: true
            description: "Query parameter name"

  geo:
    description: "Country/region targeting settings"
    endpoints:
      list:
        method: GET
        path: "/GetCountryRegionSettings"
        description: "Get country/region targeting settings for a site (may require elevated account permissions)"
        params:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
        response:
          type: array
          item: CountryRegionSetting
      add:
        method: POST
        path: "/AddCountryRegionSettings"
        description: "Add a country/region targeting setting"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: url
            type: string
            required: true
            description: "URL or directory the targeting applies to"
          - name: twoLetterISOCountryName
            type: string
            required: true
            description: "Two-letter ISO country code to target"
      remove:
        method: POST
        path: "/RemoveCountryRegionSettings"
        description: "Remove a country/region targeting setting"
        body:
          - name: siteUrl
            type: string
            required: true
            description: "Site URL"
          - name: url
            type: string
            required: true
            description: "URL or directory"
          - name: twoLetterISOCountryName
            type: string
            required: true
            description: "Two-letter ISO country code"

types:
  Site:
    fields:
      - name: Url
        type: string
      - name: IsVerified
        type: bool
      - name: AuthenticationCode
        type: string
  SiteRole:
    fields:
      - name: SiteUrl
        type: string
      - name: AuthorizedSiteUrl
        type: string
      - name: Email
        type: string
      - name: Role
        type: string
      - name: DelegationType
        type: string
  ChildSite:
    fields:
      - name: Url
        type: string
      - name: IsVerified
        type: bool
  SiteMove:
    fields:
      - name: SourceUrl
        type: string
      - name: TargetUrl
        type: string
      - name: Date
        type: string
      - name: Type
        type: string
  Feed:
    fields:
      - name: Url
        type: string
      - name: Status
        type: string
      - name: SubmittedDate
        type: string
      - name: LastCrawledDate
        type: string
      - name: UrlCount
        type: int
      - name: ErrorCount
        type: int
  UrlSubmissionQuota:
    fields:
      - name: DailyQuota
        type: int
      - name: MonthlyQuota
        type: int
  ContentSubmissionQuota:
    fields:
      - name: DailyQuota
        type: int
      - name: MonthlyQuota
        type: int
  FetchedUrl:
    fields:
      - name: Url
        type: string
      - name: Status
        type: string
      - name: FetchDate
        type: string
  FetchedUrlDetails:
    fields:
      - name: Url
        type: string
      - name: Status
        type: string
      - name: HttpStatusCode
        type: int
      - name: ContentLength
        type: int
      - name: FetchDate
        type: string
  RankTrafficStat:
    fields:
      - name: Date
        type: string
      - name: Impressions
        type: int
      - name: Clicks
        type: int
  QueryStat:
    fields:
      - name: Query
        type: string
      - name: Impressions
        type: int
      - name: Clicks
        type: int
      - name: AvgClickPosition
        type: float
      - name: AvgImpressionPosition
        type: float
  PageStat:
    fields:
      - name: Query
        type: string
      - name: Impressions
        type: int
      - name: Clicks
        type: int
      - name: AvgClickPosition
        type: float
      - name: AvgImpressionPosition
        type: float
  QueryPageStat:
    fields:
      - name: Query
        type: string
      - name: Page
        type: string
      - name: Impressions
        type: int
      - name: Clicks
        type: int
      - name: AvgClickPosition
        type: float
      - name: AvgImpressionPosition
        type: float
  QueryPageDetailStat:
    fields:
      - name: Date
        type: string
      - name: Query
        type: string
      - name: Page
        type: string
      - name: Impressions
        type: int
      - name: Clicks
        type: int
      - name: Position
        type: float
  UrlInfo:
    fields:
      - name: Url
        type: string
      - name: AnchorCount
        type: int
      - name: TotalChildUrlCount
        type: int
      - name: DocumentSize
        type: int
      - name: DiscoveryDate
        type: string
      - name: LastCrawledDate
        type: string
      - name: HttpStatus
        type: int
  UrlTrafficInfo:
    fields:
      - name: Url
        type: string
      - name: Impressions
        type: int
      - name: Clicks
        type: int
  CrawlStat:
    fields:
