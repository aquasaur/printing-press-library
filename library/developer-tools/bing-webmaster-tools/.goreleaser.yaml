version: 2
project_name: bing-webmaster-tools-pp-cli
changelog:
  disable: true
builds:
  - id: bing-webmaster-tools-pp-cli
    main: ./cmd/bing-webmaster-tools-pp-cli
    binary: bing-webmaster-tools-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/bing-webmaster-tools/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: bing-webmaster-tools-pp-mcp
    main: ./cmd/bing-webmaster-tools-pp-mcp
    binary: bing-webmaster-tools-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: bing-webmaster-tools-pp-cli
    repository:
      owner: cameron-bailey
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Bing Webmaster Tools API method, plus a local store, offline search, and SEO analytics no other Bing tool has..."
    install: |
      bin.install "bing-webmaster-tools-pp-cli"
      bin.install "bing-webmaster-tools-pp-mcp"
