version: 2
project_name: weather-goat-pp-cli
changelog:
  disable: true
builds:
  - id: weather-goat-pp-cli
    main: ./cmd/weather-goat-pp-cli
    binary: weather-goat-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/weather-goat/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: weather-pp-mcp
    main: ./cmd/weather-pp-mcp
    binary: weather-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: weather-goat-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Weather GOAT — forecasts, alerts, air quality, and activity verdicts powered by Open-Meteo and NWS"
    install: |
      bin.install "weather-goat-pp-cli"
      bin.install "weather-pp-mcp"
