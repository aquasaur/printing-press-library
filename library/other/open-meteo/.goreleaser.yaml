version: 2
project_name: open-meteo-pp-cli
changelog:
  disable: true
builds:
  - id: open-meteo-pp-cli
    main: ./cmd/open-meteo-pp-cli
    binary: open-meteo-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/open-meteo/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: open-meteo-pp-mcp
    main: ./cmd/open-meteo-pp-mcp
    binary: open-meteo-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: open-meteo-pp-cli
    repository:
      owner: hiten-shah
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Open-Meteo offers free weather forecast APIs for open-source developers and non-commercial use. No API key is required."
    install: |
      bin.install "open-meteo-pp-cli"
      bin.install "open-meteo-pp-mcp"
