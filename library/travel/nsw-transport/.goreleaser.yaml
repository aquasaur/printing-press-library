version: 2
project_name: nsw-transport-pp-cli
changelog:
  disable: true
builds:
  - id: nsw-transport-pp-cli
    main: ./cmd/nsw-transport-pp-cli
    binary: nsw-transport-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/travel/nsw-transport/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: nsw-transport-pp-mcp
    main: ./cmd/nsw-transport-pp-mcp
    binary: nsw-transport-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: nsw-transport-pp-cli
    repository:
      owner: aquasaur
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every NSW transport, traffic, and fuel feed in one CLI — plus a local store and cross-source commands no single..."
    install: |
      bin.install "nsw-transport-pp-cli"
      bin.install "nsw-transport-pp-mcp"
